<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfólio de Adriana Sousa - Product Manager & AI Solutions Architect. Especialista em IA, Big Data e ERPs.">
    <meta name="theme-color" content="#020617">
    
    <!-- Open Graph / Previews para LinkedIn e WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Adriana Sousa | Product & AI Engineer">
    <meta property="og:description" content="Especialista em transformar dados massivos e processos operacionais complexos em produtos digitais de alta performance.">
    <meta property="og:image" content="https://adrianasousa-dev.github.io/portfolio/perfil.jpg">
    <meta property="og:url" content="https://github.com/adrianasousa-dev">

    <title>Adriana Sousa | Product & AI Engineer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-glow { position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 80%; height: 500px; background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%); z-index: -1; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const allProjects = [
            {
                id: 1,
                title: "The Market Architect v13.1",
                category: "IA & Big Data",
                tag: "Engenharia de Prompt",
                desc: "Motor de inteligência capaz de consolidar ecossistemas de dados processando +390k logs para extração de avatares e mecanismos de vendas via API Gemini.",
                icon: "fa-solid fa-microchip",
                stats: "390.000+ LOGS PROCESSADOS"
            },
            {
                id: 2,
                title: "Suíte Auditores Jurídicos",
                category: "IA & Big Data",
                tag: "Legal Tech & Compliance",
                desc: "4 Softwares de Auditoria com 'Escudos Anti-Alucinação' via Regex. Garantia de precisão documental e integridade jurídica.",
                icon: "fa-solid fa-scale-balanced",
                stats: "INTEGRAÇÃO API GEMINI"
            },
            {
                id: 25,
                title: "Nexus AI Command Center",
                category: "IA & Big Data",
                tag: "Automação & SO",
                desc: "Sistema Operacional autônomo. Orquestração de agentes via Sentinel Core rodando em background e monitoramento tático em tempo real.",
                icon: "fa-solid fa-network-wired",
                stats: "AGENTES AUTÔNOMOS"
            },
            {
                id: 4,
                title: "MarketMaster ERP",
                category: "ERP & Gestão",
                tag: "Varejo & Vendas",
                desc: "Sistema de gestão integrada para o varejo com controle de estoque, frente de caixa (PDV) e gestão de níveis de acesso.",
                icon: "fa-solid fa-store",
            },
            {
                id: 26,
                title: "WebCut Studio",
                category: "Growth & UX",
                tag: "Editor de Vídeo Web",
                desc: "Editor de vídeo diretamente no navegador com interface estilo CapCut. Linha do tempo interativa e renderização em Canvas.",
                icon: "fa-solid fa-photo-film",
            }
        ];

        const ProjectCard = ({ project }) => (
            <div className="glass p-6 md:p-8 rounded-3xl hover:border-sky-500/50 transition-all duration-300 group flex flex-col h-full animate-fade">
                <div className="text-sky-400 text-3xl mb-4"><i className={project.icon}></i></div>
                <span className="text-[10px] uppercase tracking-[2px] text-sky-500 font-bold mb-2">{project.tag}</span>
                <h3 className="text-xl md:text-2xl font-black mt-1 mb-3 group-hover:text-sky-400 transition-colors">{project.title}</h3>
                <p className="text-slate-400 text-sm leading-relaxed mb-6 flex-grow">{project.desc}</p>
                {project.stats && (
                    <div className="bg-sky-500/10 border border-sky-500/20 p-3 rounded-xl text-sky-400 font-mono text-xs text-center font-bold mt-auto">
                        {project.stats}
                    </div>
                )}
            </div>
        );

        const App = () => {
            const [activeFilter, setActiveFilter] = useState("Todos");
            const [showLetter, setShowLetter] = useState(false);
            const categories = ["Todos", "IA & Big Data", "ERP & Gestão", "Growth & UX"];

            const filteredProjects = useMemo(() => {
                return activeFilter === "Todos" ? allProjects : allProjects.filter(p => p.category === activeFilter);
            }, [activeFilter]);

            return (
                <div className="min-h-screen relative">
                    <div className="hero-glow"></div>
                    
                    <nav className="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center relative z-10">
                        <div className="text-xl font-black tracking-tighter">ADRIANA<span className="text-sky-500">.</span>TECH</div>
                        <div className="hidden md:flex gap-8 text-xs font-bold uppercase tracking-widest text-slate-400">
                            <a href="#portfolio" className="hover:text-white transition-colors">Portfólio</a>
                            <a href="https://github.com/adrianasousa-dev" target="_blank" className="hover:text-white transition-colors">GitHub</a>
                            <a href="https://www.linkedin.com/in/adriana-sousa-tech/" target="_blank" className="hover:text-white transition-colors">LinkedIn</a>
                        </div>
                        <a href="mailto:adrianasousa.dev@gmail.com" className="bg-white text-black px-6 py-2 rounded-full text-xs font-black uppercase hover:bg-sky-500 hover:text-white transition-all">Contato</a>
                    </nav>

                    <header className="max-w-6xl mx-auto px-6 pt-12 pb-24 relative z-10 flex flex-col-reverse md:flex-row items-center gap-12 text-center md:text-left">
                        <div className="w-full md:w-3/5">
                            <h1 className="text-5xl md:text-6xl lg:text-7xl font-black leading-tight mb-8">
                                Não faço apenas gestão. <br className="hidden md:block"/>Eu <span className="gradient-text">construo soluções.</span>
                            </h1>
                            <p className="text-lg md:text-xl text-slate-400 leading-relaxed mb-10 max-w-2xl">
                                Product Manager & AI Solutions Architect focada em transformar dados massivos e processos complexos em produtos digitais de alta performance.
                            </p>
                            <div className="flex flex-col sm:flex-row justify-center md:justify-start gap-4">
                                <button onClick={() => setShowLetter(true)} className="bg-sky-600 hover:bg-sky-500 text-white px-8 py-4 rounded-full font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 shadow-lg shadow-sky-500/25">
                                    <i className="fa-solid fa-envelope-open-text"></i> Carta de Apresentação
                                </button>
                                <a href="https://github.com/adrianasousa-dev" target="_blank" className="glass hover:bg-slate-800 text-white px-8 py-4 rounded-full font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3">
                                    <i className="fa-brands fa-github text-xl"></i> Ver GitHub
                                </a>
                            </div>
                        </div>
                        <div className="w-full md:w-2/5 flex justify-center md:justify-end">
                            <div className="relative group">
                                <div className="absolute inset-0 bg-sky-500 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                                <img src="./perfil.jpg" alt="Adriana Sousa" className="w-56 h-56 md:w-80 md:h-80 object-cover rounded-full border-4 border-slate-800 relative z-10 transform group-hover:scale-105 transition-transform duration-500" />
                            </div>
                        </div>
                    </header>

                    <section id="portfolio" className="max-w-7xl mx-auto px-6 py-10 relative z-10">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-black mb-4">Meu <span className="text-sky-500">Ecossistema</span></h2>
                            <div className="flex flex-wrap justify-center gap-2 mb-12">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setActiveFilter(cat)} className={`px-5 py-2.5 rounded-full text-xs font-bold uppercase tracking-wider transition-all ${activeFilter === cat ? "bg-sky-500 text-white" : "glass text-slate-400"}`}>{cat}</button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredProjects.map(project => <ProjectCard key={project.id} project={project} />)}
                        </div>
                    </section>

                    <footer className="max-w-7xl mx-auto px-6 py-12 mt-20 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
                        <div className="text-center md:text-left">
                            <p className="text-xs text-slate-400 font-semibold"><i className="fa-solid fa-location-dot mr-2 text-sky-500"></i>Taboão da Serra - SP, Brasil</p>
                        </div>
                        <div className="flex gap-6 text-2xl">
                            <a href="https://github.com/adrianasousa-dev" target="_blank" className="text-slate-400 hover:text-sky-400 transition-colors"><i className="fa-brands fa-github"></i></a>
                            <a href="https://www.linkedin.com/in/adriana-sousa-tech/" target="_blank" className="text-slate-400 hover:text-sky-400 transition-colors"><i className="fa-brands fa-linkedin"></i></a>
                            <a href="mailto:adrianasousa.dev@gmail.com" className="text-slate-400 hover:text-sky-400 transition-colors"><i className="fa-solid fa-envelope"></i></a>
                        </div>
                    </footer>

                    {showLetter && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl relative p-8 md:p-12 animate-fade">
                                <button onClick={() => setShowLetter(false)} className="absolute top-6 right-6 text-slate-400 hover:text-white text-2xl"><i className="fa-solid fa-xmark"></i></button>
                                <h2 className="text-3xl font-black text-white mb-8 border-b border-slate-800 pb-4">Carta de Apresentação</h2>
                                <p className="leading-relaxed text-slate-300">Sou uma especialista em produto com sólida base técnica em <strong>Python e React</strong>, dedicada a construir soluções que unem Inteligência Artificial e alta performance. No último ano, liderei o desenvolvimento do ecossistema <strong>SoftGestão</strong>, processando mais de <strong>390 mil logs</strong> de dados para extrair padrões táticos de mercado.</p>
                                <div className="pt-8 mt-8 border-t border-slate-800">
                                    <p className="font-black text-white text-xl">Adriana Mendes da Cruz Sousa</p>
                                    <p className="text-sky-500 font-bold text-sm uppercase tracking-widest">Product Manager & AI Solutions Architect</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
